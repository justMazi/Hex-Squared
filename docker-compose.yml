version: '3.8'

services:
  hex_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: docker.mazi.lol/hex_backend:latest
    ports:
      - "8100:8000"

  hex_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: docker.mazi.lol/hex_frontend:latest
    ports:
      - "3100:3000"
